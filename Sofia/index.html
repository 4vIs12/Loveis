<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Для Софії</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --rose: #c9856a;
        --blush: #e8b4a0;
        --deep: #1a1018;
        --muted: rgba(255, 255, 255, 0.55);
        --glass: rgba(255, 255, 255, 0.06);
        --border: rgba(255, 255, 255, 0.12);
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "Jost", sans-serif;
        background: var(--deep);
        color: #fff;
        overflow-x: hidden;
        cursor: none;
      }

      #cursor {
        position: fixed;
        width: 10px;
        height: 10px;
        background: var(--rose);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
      }
      #cursor-ring {
        position: fixed;
        width: 36px;
        height: 36px;
        border: 1px solid rgba(201, 133, 106, 0.4);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
      }

      #heartCanvas {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        opacity: 0.5;
      }

      #music-btn {
        position: fixed;
        top: 1.4rem;
        right: 1.4rem;
        z-index: 100;
        background: var(--glass);
        border: 1px solid var(--border);
        backdrop-filter: blur(12px);
        border-radius: 50%;
        width: 44px;
        height: 44px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: none;
        color: var(--muted);
        transition:
          background 0.25s,
          transform 0.2s,
          color 0.2s;
      }
      #music-btn:hover {
        background: rgba(255, 255, 255, 0.12);
        transform: scale(1.08);
        color: #fff;
      }
      #music-btn svg {
        width: 18px;
        height: 18px;
      }

      #hero {
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        z-index: 1;
      }

      #hero-photo {
        position: absolute;
        inset: 0;
        background-image: url("photo_2026-04-21_21-42-47.jpg");
        background-size: cover;
        background-position: center;
        filter: blur(3px) brightness(0.82);
        transform: scale(1.08);
        z-index: 0;
      }
      #hero-photo1 {
        position: absolute;
        inset: 0;
        background-image: url("photo_2026-04-21_21-42-48.jpg");
        background-size: cover;
        background-position: center;
        filter: blur(4px) brightness(0.82);
        transform: scale(1.08);
        z-index: -3;
      }
      #hero-photo2 {
        position: absolute;
        inset: 0;
        background-image: url("photo_2026-04-21_21-42-46.jpg");
        background-size: cover;
        background-position: center;
        filter: blur(4px) brightness(0.82);
        transform: scale(1.08);
        z-index: -3;
      }
      #hero-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to bottom,
          rgba(18, 8, 15, 0.3) 0%,
          rgba(18, 8, 15, 0.78) 100%
        );
        z-index: 1;
      }
      .hero-content {
        position: relative;
        z-index: 2;
        text-align: center;
        padding: 2rem;
        max-width: 700px;
      }
      .hero-eyebrow {
        font-weight: 200;
        font-size: clamp(0.62rem, 1.4vw, 0.78rem);
        letter-spacing: 0.38em;
        text-transform: uppercase;
        color: var(--blush);
        opacity: 0;
        animation: fadeUp 0.9s 0.4s ease forwards;
      }
      .hero-title {
        font-family: "Cormorant Garamond", serif;
        font-weight: 300;
        font-size: clamp(2.6rem, 8.5vw, 6rem);
        line-height: 1.08;
        margin: 1.2rem 0 1.5rem;
        opacity: 0;
        animation: fadeUp 1s 0.7s ease forwards;
      }
      .hero-title em {
        font-style: italic;
        color: var(--blush);
      }
      .hero-sub {
        font-weight: 200;
        font-size: clamp(0.82rem, 2vw, 1rem);
        color: var(--muted);
        letter-spacing: 0.08em;
        opacity: 0;
        animation: fadeUp 0.9s 1s ease forwards;
      }
      .scroll-cue {
        position: absolute;
        bottom: 2.4rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        opacity: 0;
        animation: fadeIn 1s 1.7s ease forwards;
      }
      .scroll-cue span {
        font-size: 0.62rem;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .scroll-line {
        width: 1px;
        height: 46px;
        background: linear-gradient(to bottom, var(--blush), transparent);
        animation: linePulse 2s 2s ease-in-out infinite;
      }

      #compliments {
        position: relative;
        z-index: 1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 6rem 1.5rem;
        background: linear-gradient(to bottom, #12080f, #0d0b17 50%, #12080f);
      }
      .section-label {
        font-size: 0.62rem;
        letter-spacing: 0.42em;
        text-transform: uppercase;
        color: white;
        margin-bottom: 3rem;
        font-weight: 300;
        text-align: center;
      }
      .card-stage {
        position: relative;
        width: 100%;
        max-width: 580px;
        min-height: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .compliment-card {
        position: absolute;
        width: 100%;
        padding: 2.8rem 3rem;
        background: var(--glass);
        border: 1px solid var(--border);
        backdrop-filter: blur(28px);
        border-radius: 22px;
        text-align: center;
        opacity: 0;
        transform: translateY(24px) scale(0.97);
        transition:
          opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1),
          transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: none;
      }
      .compliment-card.active {
        opacity: 1;
        transform: translateY(0) scale(1);
        pointer-events: auto;
      }
      .compliment-card.exit {
        opacity: 0;
        transform: translateY(-16px) scale(0.97);
        transition:
          opacity 0.35s ease,
          transform 0.35s ease;
      }
      .card-number {
        font-size: 0.58rem;
        letter-spacing: 0.38em;
        color: var(--rose);
        text-transform: uppercase;
        margin-bottom: 1.4rem;
      }
      .card-text {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(1.2rem, 3.8vw, 1.65rem);
        font-weight: 300;
        line-height: 1.65;
        color: rgba(255, 255, 255, 0.92);
      }
      .card-text em {
        font-style: italic;
        color: var(--blush);
      }
      .card-line {
        display: block;
        width: 30px;
        height: 1px;
        background: linear-gradient(
          to right,
          transparent,
          var(--rose),
          transparent
        );
        margin: 1.6rem auto 0;
      }
      .progress-dots {
        display: flex;
        gap: 0.5rem;
        margin-top: 2.4rem;
        justify-content: center;
        flex-wrap: wrap;
      }
      .dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.18);
        transition:
          background 0.4s,
          transform 0.3s;
      }
      .dot.done {
        background: var(--rose);
      }
      .dot.active {
        background: var(--blush);
        transform: scale(1.55);
      }

      #next-btn {
        margin-top: 3rem;
        padding: 0.85rem 2.6rem;
        background: transparent;
        border: 1px solid var(--border);
        color: rgba(255, 255, 255, 0.8);
        border-radius: 100px;
        font-family: "Jost", sans-serif;
        font-size: 0.78rem;
        font-weight: 300;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        cursor: none;
        position: relative;
        overflow: hidden;
        transition:
          border-color 0.3s,
          color 0.3s,
          transform 0.2s;
      }
      #next-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(201, 133, 106, 0.18),
          rgba(232, 180, 160, 0.07)
        );
        opacity: 0;
        transition: opacity 0.3s;
      }
      #next-btn:hover::before {
        opacity: 1;
      }
      #next-btn:hover {
        border-color: var(--rose);
        color: #fff;
        transform: translateY(-2px);
      }

      #closing {
        margin-top: -20px;
        position: relative;
        z-index: -1;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 6rem 1.5rem;
        background: linear-gradient(
          160deg,
          #0d0b17 0%,
          #1a0e16 60%,
          #12080f 100%
        );
        text-align: center;
        overflow: hidden;
      }
      .closing-glow {
        position: absolute;
        width: 520px;
        height: 520px;
        background: radial-gradient(
          circle,
          rgba(201, 133, 106, 0.11) 0%,
          transparent 70%
        );
        border-radius: 50%;
        pointer-events: none;
        animation: glowPulse 5s ease-in-out infinite;
      }
      .closing-eyebrow {
        font-size: 0.62rem;
        letter-spacing: 0.44em;
        text-transform: uppercase;
        color: var(--rose);
        font-weight: 200;
        margin-bottom: 2rem;
        opacity: 0;
        transform: translateY(16px);
        transition:
          opacity 0.9s,
          transform 0.9s;
      }
      .closing-title {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(2.8rem, 9.5vw, 6.5rem);
        font-weight: 300;
        line-height: 1.05;
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 1.1s 0.15s,
          transform 1.1s 0.15s;
      }
      .closing-title em {
        font-style: italic;
        color: var(--blush);
        display: block;
      }
      .closing-body {
        max-width: 440px;
        margin-top: 2.4rem;
        font-weight: 200;
        font-size: clamp(0.84rem, 2vw, 0.98rem);
        color: var(--muted);
        line-height: 1.9;
        letter-spacing: 0.04em;
        opacity: 0;
        transform: translateY(14px);
        transition:
          opacity 1s 0.3s,
          transform 1s 0.3s;
      }
      .closing-sig {
        margin-top: 2.8rem;
        font-family: "Cormorant Garamond", serif;
        font-size: 1.35rem;
        font-style: italic;
        color: var(--blush);
        opacity: 0;
        transform: translateY(12px);
        transition:
          opacity 1s 0.5s,
          transform 1s 0.5s;
      }
      #closing.in-view .closing-eyebrow,
      #closing.in-view .closing-title,
      #closing.in-view .closing-body,
      #closing.in-view .closing-sig {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
      @keyframes linePulse {
        0%,
        100% {
          opacity: 0.4;
        }
        50% {
          opacity: 1;
        }
      }
      @keyframes glowPulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.7;
        }
        50% {
          transform: scale(1.15);
          opacity: 1;
        }
      }

      @media (max-width: 480px) {
        .compliment-card {
          padding: 2rem 1.5rem;
        }
        #next-btn {
          padding: 0.75rem 1.8rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>
    <canvas id="heartCanvas"></canvas>

    <!-- HERO -->
    <section id="hero">
      <div id="hero-bg"></div>
      <div id="hero-photo"></div>
      <div id="hero-overlay"></div>
      <div class="hero-content">
        <p class="hero-eyebrow">Те, що я хочу тобі сказати</p>
        <h1 class="hero-title">
          Ти — та,<br /><em>поруч з якою</em><br />світ стає іншим.
        </h1>
        <p class="hero-sub">Гортай вниз</p>
      </div>
      <div class="scroll-cue">
        <span>Гортай</span>
        <div class="scroll-line"></div>
      </div>
    </section>

    <section id="compliments">
      <div id="hero-photo1"></div>

      <p class="section-label">Дев'ять речей, які я хочу тобі сказати</p>
      <div class="card-stage" id="cardStage"></div>
      <div class="progress-dots" id="dots"></div>
      <button id="next-btn">Далі →</button>
    </section>

    <section id="closing">
      <div id="hero-photo2"></div>
      <div id="hero-overlay"></div>
      <div class="closing-glow"></div>
      <p class="closing-eyebrow">І наостанок — найголовніше</p>
      <h2 class="closing-title">Дякую,<br /><em>що існуєш.</em></h2>
      <p class="closing-body">
        Від моменту коли я почав з тобою спілкуватись - моє життя стало
        яскравішим
      </p>
    </section>

    <script>
      const compliments = [
        {
          text: "З тобою люблю звучить не як слово, а як щось реальне",
        },
        {
          text: "Ти дуже швидко стала для мене важливою — і це мені подобається",
        },
        {
          text: "Ти не просто подобаєшся — ти реально чіпляєш",
        },
        {
          text: "Я ловлю себе на тому, що думаю про тебе без причини",
        },
        {
          text: "Ти робиш мій день іншим,просто коли ми переписуємось",
        },
        {
          text: "Мені комфортно з тобою, і це для мене важливо",
        },
        {
          text: "З тобою хочеться не просто переписуватись, а бачити тебе в реальності завжди",
        },
        {
          text: "Я не знаю, куди це все йде, але мені подобається, що це з тобою",
        },
        {
          text: "Я радий, що ти є Ти найкраща ❤️❤️❤️❤️❤️❤️❤️❤️",
        },
      ];

      const curEl = document.getElementById("cursor");
      const rngEl = document.getElementById("cursor-ring");
      let mx = 0,
        my = 0,
        rx = 0,
        ry = 0;
      document.addEventListener("mousemove", (e) => {
        mx = e.clientX;
        my = e.clientY;
      });
      (function tick() {
        curEl.style.left = mx + "px";
        curEl.style.top = my + "px";
        rx += (mx - rx) * 0.12;
        ry += (my - ry) * 0.12;
        rngEl.style.left = rx + "px";
        rngEl.style.top = ry + "px";
        requestAnimationFrame(tick);
      })();

      (function () {
        const c = document.getElementById("heartCanvas");
        const ctx = c.getContext("2d");
        let W,
          H,
          list = [];
        function resize() {
          W = c.width = innerWidth;
          H = c.height = innerHeight;
        }
        resize();
        addEventListener("resize", resize);
        function spawn() {
          list.push({
            x: Math.random() * W,
            y: H + 20,
            s: 3 + Math.random() * 9,
            sp: 0.15 + Math.random() * 0.38,
            dx: (Math.random() - 0.5) * 0.28,
            o: 0.04 + Math.random() * 0.14,
            r: (Math.random() - 0.5) * 0.4,
            rs: (Math.random() - 0.5) * 0.0025,
          });
        }
        for (let i = 0; i < 18; i++) {
          spawn();
          list[i].y = Math.random() * H;
        }
        let f = 0;
        (function loop() {
          ctx.clearRect(0, 0, W, H);
          if (f++ % 90 === 0 && list.length < 28) spawn();
          list = list.filter((h) => h.y > -30);
          list.forEach((h) => {
            h.y -= h.sp;
            h.x += h.dx;
            h.r += h.rs;
            ctx.save();
            ctx.globalAlpha = h.o;
            ctx.fillStyle = "#c9856a";
            ctx.translate(h.x, h.y);
            ctx.rotate(h.r);
            ctx.scale(h.s, h.s);
            ctx.beginPath();
            ctx.moveTo(0, -0.3);
            ctx.bezierCurveTo(0.5, -0.9, 1.1, 0.1, 0, 0.8);
            ctx.bezierCurveTo(-1.1, 0.1, -0.5, -0.9, 0, -0.3);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          });
          requestAnimationFrame(loop);
        })();
      })();

      (function () {
        const stage = document.getElementById("cardStage");
        const dotsEl = document.getElementById("dots");
        const btn = document.getElementById("next-btn");
        let current = 0;

        compliments.forEach((c, i) => {
          const el = document.createElement("div");
          el.className = "compliment-card" + (i === 0 ? " active" : "");
          el.innerHTML = `
      <div class="card-number">${String(i + 1).padStart(2, "0")} / ${String(compliments.length).padStart(2, "0")}</div>
      <p class="card-text">${c.text}</p>
      <span class="card-line"></span>`;
          stage.appendChild(el);
        });

        compliments.forEach((_, i) => {
          const d = document.createElement("div");
          d.className = "dot" + (i === 0 ? " active" : "");
          dotsEl.appendChild(d);
        });

        const cards = [...document.querySelectorAll(".compliment-card")];
        const dots = [...document.querySelectorAll(".dot")];

        function goTo(idx) {
          const prev = current;
          current = idx;

          cards[prev].classList.remove("active");
          cards[prev].classList.add("exit");
          dots[prev].classList.remove("active");
          dots[prev].classList.add("done");

          setTimeout(() => {
            cards[prev].classList.remove("exit");
            cards[current].classList.add("active");
            dots[current].classList.add("active");
          }, 400);

          if (current === compliments.length - 1) {
            btn.textContent = "До фіналу ↓";
            btn.dataset.final = "1";
          }
        }

        btn.addEventListener("click", () => {
          if (btn.dataset.final) {
            document
              .getElementById("closing")
              .scrollIntoView({ behavior: "smooth" });
            return;
          }
          if (current < compliments.length - 1) goTo(current + 1);
        });
      })();

      new IntersectionObserver(
        (entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) e.target.classList.add("in-view");
          });
        },
        { threshold: 0.22 },
      ).observe(document.getElementById("closing"));
    </script>
  </body>
</html>
